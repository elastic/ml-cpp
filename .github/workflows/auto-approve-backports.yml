name: Auto-approve backport PRs

on:
  pull_request_target:
    branches-ignore: [main]
    types: [opened]

permissions:
  pull-requests: write

jobs:
  auto-approve:
    name: Auto-approve backport
    runs-on: ubuntu-latest
    if: |
      startsWith(github.event.pull_request.head.ref, 'backport/') &&
      github.event.pull_request.user.login == 'github-actions[bot]'
    steps:
      - name: Check for auto-backport label on source PR
        id: check-auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: |
          # Extract original PR number from title: [9.2] Title (#1234)
          ORIGINAL_PR=$(echo "$PR_TITLE" | grep -oE '\(#[0-9]+\)' | tail -1 | tr -d '(#)')
          if [ -z "$ORIGINAL_PR" ]; then
            echo "Could not extract original PR number. Skipping."
            echo "should_approve=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Original PR: #$ORIGINAL_PR"

          HAS_LABEL=$(gh pr view "$ORIGINAL_PR" --repo "$REPO" --json labels \
            --jq '[.labels[].name] | if index("auto-backport") then "true" else "false" end')

          if [ "$HAS_LABEL" = "true" ]; then
            echo "Original PR #$ORIGINAL_PR has auto-backport label."
            echo "should_approve=true" >> "$GITHUB_OUTPUT"
          else
            echo "Original PR #$ORIGINAL_PR does not have auto-backport label. Skipping."
            echo "should_approve=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve backport PR
        if: steps.check-auto.outputs.should_approve == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --approve \
            --body "Auto-approved: backport PR from a source PR with the auto-backport label."
