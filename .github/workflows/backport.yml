name: Backport

on:
  pull_request_target:
    types: ["labeled", "closed"]

permissions:
  contents: read
  id-token: write

jobs:
  backport:
    name: Backport PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    # Run when a merged PR is closed or labeled, but skip PRs that are
    # themselves backports (identified by the 'backport' label) to avoid loops.
    if: |
      github.event.pull_request.merged == true &&
      !(contains(github.event.pull_request.labels.*.name, 'backport'))
    steps:
      - name: Fetch ephemeral GitHub token
        id: fetch-token
        uses: elastic/ci-gh-actions/fetch-github-token@v1.0.0
        with:
          vault-instance: "ci-prod"

      - name: Backport Action
        uses: sorenlouv/backport-github-action@v10.2.0
        with:
          github_token: ${{ steps.fetch-token.outputs.token }}

      - name: Info log
        if: ${{ success() }}
        run: cat ~/.backport/backport.info.log

      - name: Debug log
        if: ${{ failure() }}
        run: cat ~/.backport/backport.debug.log
